{% extends "master.html" %}

{% block content %}
<div class="chatbox">
  <h2>Finder Assistant</h2>

  <form method="get" action="{% url 'ai:chat' %}">
    <input type="text" name="msg" placeholder="Ask something..." value="{{ request.GET.msg }}">
    <button type="submit">Send</button>
  </form>

  {% if reply %}
    <div class="reply">
      <p><strong>Assistant:</strong></p>
      <pre>{{ reply }}</pre>
    </div>
  {% endif %}
</div>
{% endblock %}
